<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothing Advisor - ClimateLens</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <!-- FIX: go up one level to src/, then into js/ -->
  <script type="module" src="../js/clothing.js"></script>
</head>
<body class="page-entrance">
  <div id="main-header"></div>
  
  <main class="stagger-children">
    <div id="location-search" class="search-wrapper">
      <input type="text" id="city-search" placeholder="Search city..." autocomplete="off" />
      <button id="search-btn">Search</button>
      <div id="search-suggestions" class="suggestions hidden"></div>
    </div>
    
    <div id="location-bar"></div>
    <div id="weather-summary"></div>
    <div id="clothing-container"></div>
    <div id="hourly-clothing"></div>
  </main>
  
  <div id="main-footer"></div>
</body>

</html>
