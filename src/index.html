<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClimateLens</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script type="module" src="/js/main.js"></script>
</head>
<body class="page-entrance">
  <div id="main-header"></div>
  
  <main class="stagger-children">
    <div id="location-search" class="search-wrapper">
      <input type="text" id="city-search" placeholder="Search city (e.g. Lagos, London)..." autocomplete="off" />
      <button id="search-btn">Search</button>
      <div id="search-suggestions" class="suggestions hidden"></div>
    </div>
    
    <div id="location-bar"></div>
    <div id="weather-container"></div>
    <div id="hourly-container"></div>
    <div id="forecast-container"></div>
  </main>
  
  <div id="main-footer"></div>
</body>
</html>
