<header class="site-header">
  <div class="header-container">
    
    <a href="/" class="logo-link" aria-label="ClimateLens Home">
      <img src="/logo/climatelens-logo.svg" alt="ClimateLens logo" class="logo-img">
    </a>
    
    <nav class="main-nav" id="nav-bar" aria-label="Main navigation">
      <ul class="nav-list">
        <li class="nav-item">
          <a href="/locations.html?city=lagos" class="nav-link">
            <img src="/icons/location.svg" alt="Locations icon" class="nav-icon">
            <span>Location</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="/history.html?view=weekly" class="nav-link">
            <img src="/icons/history.svg" alt="History icon" class="nav-icon">
            <span>History</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="/settings.html?tab=profile" class="nav-link">
            <img src="/icons/settings.svg" alt="Settings icon" class="nav-icon">
            <span>Settings</span>
          </a>
        </li>
      </ul>
    </nav>
    
    <div class="header-actions">
      <button class="location-btn" id="current-location-btn" aria-label="Use my current location">
        <img src="/icons/location-country.svg" alt="Location icon" class="location-icon">
        <span class="location-text" id="header-location-text">Lagos, Nigeria</span>
      </button>

      <select class="dropdown-select" aria-label="Dropdown menu">
        <option value="" disabled selected hidden>Dropdown</option>
        <option value="download-map">Download Map</option>
      </select>

      <button class="hamburger-btn" id="hamburger-toggle" aria-label="Toggle menu">
        <img src="/icons/hamburger-open.svg" alt="Menu" class="hamburger-icon">
      </button>
    </div>
    
  </div>
</header>
